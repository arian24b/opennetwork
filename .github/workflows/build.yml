name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: build
        run: go build -o proxylint ./cmd/proxylint

      - name: test
        run: go vet ./...

      - uses: actions/upload-artifact@v4
        with:
          name: proxylint-${{ runner.os }}
          path: proxylint
